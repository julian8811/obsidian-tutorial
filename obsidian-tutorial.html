<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Obsidian — Tutorial Interactivo</title>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e1e2e;
    --surface: #2a2a3e;
    --surface2: #363650;
    --border: #3a3a52;
    --text: #e0e0f0;
    --text2: #a0a0c0;
    --accent: #a688ff;
    --accent2: #7c5cfc;
    --green: #7ecf8a;
    --orange: #f5b97f;
    --pink: #f28fad;
    --cyan: #7dd4fc;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }

  /* ─── Layout ─── */
  .container {
    max-width: 900px;
    width: 100%;
    padding: 20px;
    position: relative;
  }

  /* ─── Header ─── */
  header {
    text-align: center;
    padding: 32px 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  header h1 .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #1e1e2e;
  }
  header p {
    color: var(--text2);
    margin-top: 6px;
    font-size: .95rem;
  }

  /* ─── Progress Bar ─── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    padding: 0 4px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width .5s ease;
  }
  .progress-label {
    font-size: .8rem;
    color: var(--text2);
    white-space: nowrap;
    font-weight: 500;
    min-width: 60px;
    text-align: right;
  }

  /* ─── Step navigation ─── */
  .step-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-dot:hover { border-color: var(--accent); color: var(--accent); }
  .step-dot.active { background: var(--accent); border-color: var(--accent); color: #1e1e2e; }
  .step-dot.done { border-color: var(--green); color: var(--green); }

  /* ─── Step Card ─── */
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    display: none;
    animation: fadeIn .35s ease;
  }
  .step-card.visible { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-card h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--accent);
  }
  .step-card .step-subtitle {
    font-size: .85rem;
    color: var(--text2);
    margin-bottom: 20px;
  }
  .step-card p, .step-card li {
    margin-bottom: 12px;
    color: var(--text);
  }
  .step-card ul, .step-card ol {
    padding-left: 24px;
  }
  .step-card li { margin-bottom: 6px; }

  /* ─── Code / Inline ─── */
  code {
    font-family: var(--mono);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .85em;
    color: var(--pink);
  }
  .code-block {
    font-family: var(--mono);
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 12px 0;
    font-size: .88rem;
    overflow-x: auto;
    line-height: 1.5;
    color: var(--text);
  }
  .code-block .hl { color: var(--accent); }
  .code-block .hlg { color: var(--green); }
  .code-block .hlc { color: var(--cyan); }
  .code-block .hlo { color: var(--orange); }
  .code-block .hlp { color: var(--pink); }
  .code-block .com { color: #6a6a8a; font-style: italic; }

  /* ─── Tip / Info Boxes ─── */
  .tip {
    background: rgba(166,136,255,.12);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
    font-size: .92rem;
  }
  .tip strong { color: var(--accent); }
  .tip-green {
    background: rgba(126,207,138,.12);
    border-left-color: var(--green);
  }
  .tip-green strong { color: var(--green); }
  .tip-orange {
    background: rgba(245,185,127,.12);
    border-left-color: var(--orange);
  }
  .tip-orange strong { color: var(--orange); }

  /* ─── Buttons ─── */
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font);
    font-size: .9rem;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #1e1e2e;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { opacity: .4; cursor: default; transform: none; }
  .btn-success {
    background: var(--green);
    color: #1e1e2e;
  }
  .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }

  /* ─── Markdown Playground ─── */
  .playground {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .playground textarea {
    font-family: var(--mono);
    font-size: .85rem;
    background: #16162a;
    color: var(--text);
    border: none;
    padding: 16px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    line-height: 1.5;
  }
  .playground textarea::placeholder { color: #5a5a7a; }
  .playground .preview {
    background: var(--surface);
    padding: 16px;
    min-height: 160px;
    line-height: 1.6;
    overflow-y: auto;
    border-left: 1px solid var(--border);
  }
  .playground .preview h1 { font-size: 1.4rem; margin-bottom: 6px; }
  .playground .preview h2 { font-size: 1.15rem; margin-bottom: 4px; }
  .playground .preview h3 { font-size: 1rem; margin-bottom: 4px; }
  .playground .preview p { margin-bottom: 8px; }
  .playground .preview ul, .playground .preview ol { padding-left: 20px; margin-bottom: 8px; }
  .playground .preview li { margin-bottom: 2px; color: var(--text); }
  .playground .preview strong { color: var(--text); font-weight: 700; }
  .playground .preview em { font-style: italic; }
  .playground .preview code {
    font-family: var(--mono);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: .82em;
    color: var(--pink);
  }
  .playground .preview blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .playground .preview input[type="checkbox"] {
    margin-right: 6px;
    accent-color: var(--accent);
  }

  .play-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .play-actions button {
    font-family: var(--font);
    font-size: .78rem;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
  }
  .play-actions button:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── Link Simulation ─── */
  .link-sim {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 16px 0;
  }
  .note-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all .25s;
    font-size: .88rem;
    color: var(--text);
    user-select: none;
  }
  .note-tag:hover { border-color: var(--accent); background: rgba(166,136,255,.08); }
  .note-tag.linked {
    border-color: var(--accent);
    background: rgba(166,136,255,.15);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(166,136,255,.15);
  }
  .note-tag .badge {
    display: inline-block;
    font-size: .7rem;
    background: var(--accent);
    color: #1e1e2e;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 600;
  }

  .link-result {
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 12px;
    font-size: .9rem;
    min-height: 60px;
  }
  .link-result .empty-state {
    color: var(--text2);
    font-style: italic;
  }
  .link-result .link-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .link-result .link-item:last-child { border: none; }
  .link-result .link-item .from { color: var(--accent); font-weight: 600; }
  .link-result .link-item .to { color: var(--cyan); }
  .link-result .link-item .arrow { color: var(--text2); margin: 0 8px; }

  /* ─── Graph Canvas ─── */
  .graph-container {
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 16px 0;
    position: relative;
  }
  .graph-container canvas {
    display: block;
    width: 100%;
    height: 340px;
    cursor: move;
  }
  .graph-legend {
    display: flex;
    gap: 16px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: .78rem;
    color: var(--text2);
    flex-wrap: wrap;
    background: var(--surface);
  }
  .graph-legend span { display: flex; align-items: center; gap: 6px; }
  .graph-legend .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ─── UI Mockup ─── */
  .ui-mockup {
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 16px 0;
    width: 100%;
  }
  .ui-mockup svg { display: block; width: 100%; height: auto; }
  .mockup-callout {
    position: relative;
    display: flex;
    flex-direction: column;
    margin: 12px 0;
  }
  .callout-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 12px 0;
  }
  @media (max-width: 520px) { .callout-grid { grid-template-columns: 1fr; } }
  .callout-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .callout-item .num {
    background: var(--accent);
    color: #1e1e2e;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .callout-item .content h4 { font-size: .88rem; color: var(--text); margin-bottom: 2px; }
  .callout-item .content p { font-size: .78rem; color: var(--text2); margin: 0; }

  /* ─── Graph Controls ─── */
  .graph-toolbar {
    display: flex;
    gap: 8px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    align-items: center;
    flex-wrap: wrap;
  }
  .graph-toolbar .g-btn {
    font-family: var(--font);
    font-size: .78rem;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
  }
  .graph-toolbar .g-btn:hover { border-color: var(--accent); color: var(--accent); }
  .graph-toolbar .g-btn.active { background: var(--accent); color: #1e1e2e; border-color: var(--accent); }
  .graph-toolbar .g-btn.g-btn-danger.active { background: var(--pink); border-color: var(--pink); color: #1e1e2e; }
  .graph-toolbar .g-label {
    font-size: .75rem;
    color: var(--text2);
    margin-left: auto;
  }
  .graph-toolbar .g-label strong { color: var(--accent); }

  .graph-builder {
    background: #12122a;
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .graph-builder .gb-note {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: .8rem;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
  }
  .graph-builder .gb-note:hover { border-color: var(--accent); color: var(--accent); }
  .graph-builder .gb-info {
    font-size: .75rem;
    color: var(--text2);
    margin-left: auto;
  }

  /* ─── Vis Demo (link flow) ─── */
  .vis-flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .vis-flow .vf-note {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: .88rem;
    color: var(--text);
    text-align: center;
    transition: all .3s;
    min-width: 100px;
  }
  .vis-flow .vf-note.linked { border-color: var(--accent); box-shadow: 0 0 20px rgba(166,136,255,.2); }
  .vis-flow .vf-note.active-link { border-color: var(--cyan); }
  .vis-flow .vf-arrow {
    font-size: 1.5rem;
    color: var(--text2);
    transition: all .3s;
  }
  .vis-flow .vf-arrow.active { color: var(--accent); transform: scale(1.3); }

  .vis-flow-hint {
    text-align: center;
    font-size: .78rem;
    color: var(--text2);
    margin-top: -8px;
    margin-bottom: 12px;
  }

  /* ─── Screenshot-style steps ─── */
  .ss-steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 16px 0;
  }
  .ss-step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .ss-step .ss-num {
    background: var(--accent2);
    color: white;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .82rem;
    flex-shrink: 0;
  }
  .ss-step .ss-content h4 { font-size: .9rem; color: var(--text); margin-bottom: 3px; }
  .ss-step .ss-content p { font-size: .82rem; color: var(--text2); margin: 0; line-height: 1.5; }
  .ss-step .ss-content code {
    font-size: .82em;
    background: rgba(166,136,255,.12);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ─── Tag Cloud ─── */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
  }
  .tag-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(166,136,255,.1);
    color: var(--accent);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: .85rem;
    border: 1px solid rgba(166,136,255,.2);
    cursor: pointer;
    transition: all .2s;
  }
  .tag-item:hover { background: rgba(166,136,255,.2); }
  .tag-item .count {
    background: var(--surface2);
    color: var(--text2);
    padding: 0 6px;
    border-radius: 8px;
    font-size: .7rem;
  }
  .tag-filtered {
    background: #16162a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 12px;
    min-height: 40px;
  }
  .tag-filtered .note-row {
    padding: 4px 0;
    color: var(--text);
  }
  .tag-filtered .note-row .highlight {
    color: var(--accent);
    font-weight: 600;
  }

  /* ─── External Link ─── */
  .ext-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .ext-link:hover { text-decoration: underline; }

  /* ─── Keyboard Shortcuts ─── */
  .kbd-shortcuts {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 20px;
    margin: 12px 0;
    font-size: .9rem;
  }
  .kbd-shortcuts kbd {
    font-family: var(--mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: .8rem;
    color: var(--text);
  }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    .container { padding: 12px; }
    header h1 { font-size: 1.4rem; }
    .step-card { padding: 20px; }
    .playground { grid-template-columns: 1fr; }
    .playground .preview { border-left: none; border-top: 1px solid var(--border); }
    .step-nav { gap: 6px; }
    .step-dot { width: 28px; height: 28px; font-size: .7rem; }
    .btn-group { flex-direction: column; }
    .graph-container canvas { height: 260px; }
  }

  /* ─── Completed overlay ─── */
  .completion-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(126,207,138,.12);
    border: 1px solid rgba(126,207,138,.3);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin: 20px 0;
  }
  .completion-badge .icon {
    width: 48px; height: 48px;
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #1e1e2e;
    flex-shrink: 0;
  }
  .completion-badge h3 { color: var(--green); margin-bottom: 4px; }
  .completion-badge p { color: var(--text2); font-size: .9rem; margin: 0; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <h1><span class="logo">◈</span> Aprende Obsidian</h1>
    <p>Tutorial interactivo — domina tu segunda mente, paso a paso</p>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0 / 10</span>
  </div>

  <!-- Step Dots -->
  <div class="step-nav" id="stepNav"></div>

  <!-- ──────── STEP TEMPLATES ──────── -->
  <!-- Cada step se renderiza dinámicamente desde JS, pero el contenedor está acá -->
  <div id="stepContainer"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  TUTORIAL DATA
// ═══════════════════════════════════════════════════════════════

const STEPS = [
  { title: '¿Qué es Obsidian?',          icon: '◈' },
  { title: 'Markdown & Notas',           icon: '✎' },

function renderDots() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<button class="step-dot${i === current ? ' active' : ''}${completed.has(i) ? ' done' : ''}"
            data-idx="${i}" title="${s.title}">${i+1}</button>`
  ).join('');
  nav.querySelectorAll('.step-dot').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.idx)));
  });
}

function renderStep() {
  const s = STEPS[current];
  const container = document.getElementById('stepContainer');
  container.innerHTML = buildStepHTML(current);
  container.querySelector('.step-card')?.classList.add('visible');

  // Update UI
  renderDots();
  updateProgress();

  // Init interactive components
  if (current === 1 || current === 2 || current === 3) initPlayground();
  if (current === 4) initLinksDemo();
  if (current === 5) initBacklinksDemo();
  if (current === 6) initTagsDemo();
  if (current === 7) initGraph();
  if (current === 8) initSearchDemo();
}

function updateProgress() {
  const pct = ((current + 1) / STEPS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current + 1} / ${STEPS.length}`;
}

function goTo(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  current = idx;
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// ═══════════════════════════════════════════════════════════════
//  BUILD STEP HTML
// ═══════════════════════════════════════════════════════════════

function buildStepHTML(idx) {
  const isLast = idx === STEPS.length - 1;
  const isFirst = idx === 0;

  let body = '';
  let extraNav = '';

  switch (idx) {
    case 0: body = stepWelcome(); break;
    case 1: body = stepMarkdown(); break;
    case 2: body = stepFormatting(); break;
    case 3: body = stepLists(); break;
    case 4: body = stepLinks(); break;
    case 5: body = stepBacklinks(); break;
    case 6: body = stepTags(); break;
    case 7: body = stepGraph(); break;
    case 8: body = stepSearch(); break;
    case 9: body = stepNext(); break;
  }

  if (idx === 99) { // special: completion shown elsewhere
    body = '';
  }

  // Mark as completed if viewing (visto)
  if (!completed.has(idx)) completed.add(idx);

  return `<div class="step-card">
    <h2>${STEPS[idx].icon} ${STEPS[idx].title}</h2>
    <p class="step-subtitle">Paso ${idx+1} de ${STEPS.length}</p>
    ${body}
    <div class="btn-group">
      ${!isFirst ? `<button class="btn btn-secondary" onclick="prev()">← Anterior</button>` : ''}
      ${!isLast ? `<button class="btn btn-primary" onclick="next()">Siguiente →</button>`
                : `<button class="btn btn-success" onclick="showCompletion()">🎉 ¡Tutorial completo!</button>`}
    </div>
    ${extraNav}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  PLAYGROUND — shared markdown renderer
// ═══════════════════════════════════════════════════════════════

function initPlayground() {
  // Each playground uses its own textarea, but they share IDs...
  // We need to be smarter. Find the visible playground.
  const container = document.getElementById('stepContainer');
  const playground = container.querySelector('.playground');
  if (!playground) return;

  const textarea = playground.querySelector('#playInput') || playground.querySelector('textarea');
  const preview = playground.querySelector('#playPreview') || playground.querySelector('.preview');
  if (!textarea || !preview) return;

  // Remove old listeners by cloning
  const newTA = textarea.cloneNode(true);
  textarea.parentNode.replaceChild(newTA, textarea);

  newTA.addEventListener('input', () => renderMarkdown(newTA.value, preview));
  renderMarkdown(newTA.value, preview);
}

function renderMarkdown(src, el) {
  let html = src
    // Escaping
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headings
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Horizontal rule
    .replace(/^---$/gm, '<hr style="border:none;border-top:2px solid var(--border);margin:12px 0;">')
    // Blockquotes
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // Checkboxes
    .replace(/- \[x\] (.+)/gi, '<label style="display:block;font-size:.88rem;"><input type="checkbox" checked disabled> $1</label>')
    .replace(/- \[ \] (.+)/gi, '<label style="display:block;font-size:.88rem;"><input type="checkbox" disabled> $1</label>')
    // Unordered list items (that aren't checkboxes)
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Ordered list items
    .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> in <ul> or <ol>
    .replace(/((?:<li>.*<\/li>\n?)+)/g, (match) => {
      // Determine if it's ordered or unordered based on original text (checkboxes already handled)
      // Default to ul for simplicity
      return '<ul style="margin-bottom:8px;">' + match + '</ul>';
    })
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Strikethrough
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // Highlight (==text==)
    .replace(/==(.+?)==/g, '<mark style="background:var(--accent);color:#1e1e2e;padding:0 4px;border-radius:3px;">$1</mark>')
    // Inline code (must be before bold/italic in general, but after the escape replacements)
    .replace(/`(.+?)`/g, '<code>$1</code>')
    // Wiki links [[Note]] or [[Note|alias]]
    .replace(/\[\[(.+?)\]\]/g, '<span style="color:var(--accent);font-weight:600;cursor:default;" title="Enlace a: $1">⟦$1⟧</span>')
    // Regular links
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a class="ext-link" href="$2" target="_blank">$1</a>')
    // Line breaks (double newline = paragraph)
    .replace(/\n\n/g, '</p><p>')
    // Single line breaks
    .replace(/\n/g, '<br>');

  el.innerHTML = '<p>' + html + '</p>';
}

function insertPlay(text) {
  const container = document.getElementById('stepContainer');
  const ta = container.querySelector('textarea');
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const before = ta.value.substring(0, start);
  const after = ta.value.substring(end);
  ta.value = before + text + after;
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

function clearPlay() {
  const container = document.getElementById('stepContainer');
  const ta = container.querySelector('textarea');
  if (!ta) return;
  ta.value = '';
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

function toggleLink(el) {
  const note = el.dataset.note;
  if (linkedNotes.has(note)) {
    linkedNotes.delete(note);
    el.classList.remove('linked');
  } else {
    linkedNotes.add(note);
    el.classList.add('linked');
  }
  updateLinkBadges();
  updateLinkResult();
  updateVisFlow(el);
}

function updateVisFlow(el) {
  const vfTarget = document.getElementById('vfTarget');
  const vfArrow = document.getElementById('vfArrow');
  const vfHint = document.getElementById('visFlowHint');
  if (!vfTarget || !vfArrow || !vfHint) return;

  const note = el.dataset.note;
  const isLinked = linkedNotes.has(note);

  if (isLinked) {
    vfTarget.textContent = '📄 ' + note;
    vfTarget.className = 'vf-note linked';
    vfArrow.className = 'vf-arrow active';
    vfHint.textContent = '✅ ' + note + ' linkeada desde Nota Actual — backlink generado automáticamente';
  } else {
    vfTarget.textContent = '📄 ?';
    vfTarget.className = 'vf-note';
    vfArrow.className = 'vf-arrow';
    vfHint.textContent = '👆 Cliqueá una nota abajo para linkearla desde "Nota Actual"';
  }
}

function updateLinkBadges() {
  document.querySelectorAll('.note-tag').forEach(el => {
    const badge = el.querySelector('.badge');
    if (!badge) return;
    const count = linkedNotes.has(el.dataset.note) ? 1 : 0;
    badge.textContent = count;
  });
}

function updateLinkResult() {
  const result = document.getElementById('linkResult');
  if (!result) return;
  if (linkedNotes.size === 0) {
    result.innerHTML = `<div class="empty-state">🔗 Cliqueá una nota para "linkearla" desde "Nota Actual"</div>`;
    return;
  }
  let html = `<div style="font-size:.82rem;color:var(--text2);margin-bottom:8px;">🔗 Enlaces creados desde <strong style="color:var(--accent);">Nota Actual</strong>:</div>`;
  linkedNotes.forEach(note => {
    html += `<div class="link-item">
      <span><span class="from">📄 Nota Actual</span><span class="arrow">→</span><span class="to">📄 ${note}</span></span>
      <code style="font-size:.75rem;">[[${note}]]</code>
    </div>`;
  });
  const backlinksCount = linkedNotes.size;
  if (backlinksCount > 0) {
    html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:.82rem;color:var(--text2);">
      ↩️ <strong style="color:var(--green);">${backlinksCount} backlink${backlinksCount > 1 ? 's' : ''}</strong> generados automáticamente
    </div>`;
  }
  result.innerHTML = html;
}

function filterTag(el) {
  const tag = el.dataset.tag;
  const filtered = document.getElementById('tagFiltered');
  if (!filtered) return;

  // Toggle off if same tag clicked
  if (activeTag === tag) {
    activeTag = null;
    document.querySelectorAll('.tag-item').forEach(t => t.style.background = '');
    filtered.innerHTML = '<span style="color:var(--text2);font-style:italic;">💡 Cliqueá un tag para ver qué notas lo tienen</span>';
    return;
  }

  activeTag = tag;
  document.querySelectorAll('.tag-item').forEach(t => {
    t.style.background = t.dataset.tag === tag ? 'rgba(166,136,255,.25)' : '';
  });

  const notes = tagNotes[tag] || [];
  let html = `<div style="font-size:.82rem;color:var(--text2);margin-bottom:8px;">📄 Notas con <strong style="color:var(--accent);">#${tag}</strong>:</div>`;
  notes.forEach(n => {
    html += `<div class="note-row">📄 <span class="highlight">${n}</span></div>`;
  });
  if (notes.length === 0) {
    html += `<div class="note-row" style="color:var(--text2);">(sin notas)</div>`;
  }
  filtered.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  GRAPH — force-directed canvas with controls
// ═══════════════════════════════════════════════════════════════

const nodeColors = { active: '#a688ff', connected: '#7ecf8a', lonely: '#6a6a8a', addable: '#f5b97f' };
let graphRunning = false;

function initGraph() {
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;

  const container = document.getElementById('graphContainer');
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight || 340;

  canvas.width = W * 2;
  canvas.height = H * 2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // Init node positions if not set
  if (!graphNodes.length) {
    const cx = W / 2, cy = H / 2;
    graphNodes = graphData.nodes.map((n) => ({
      ...n,
      x: cx + (Math.random() - 0.5) * (W * 0.6),
      y: cy + (Math.random() - 0.5) * (H * 0.6),
      vx: 0, vy: 0,
      r: n.group === 'active' ? 14 : (n.group === 'addable' ? 7 : 9),
    }));
    graphEdges = [...graphData.edges];
  }

  if (graphRunning) return;
  graphRunning = true;

  let isDragging = false;
  let dragNode = null;
  let dragOffX = 0, dragOffY = 0;

  const getMouse = (e) => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };

  const hitTest = (mx, my) => {
    for (let i = graphNodes.length - 1; i >= 0; i--) {
      const n = graphNodes[i];
      const dx = mx - n.x, dy = my - n.y;
      if (dx * dx + dy * dy < (n.r + 8) * (n.r + 8)) return n;
    }
    return null;
  };

  const handleDown = (e) => {
    const m = getMouse(e);
    const hit = hitTest(m.x, m.y);
    if (hit) {
      // Click to highlight (not drag)
      if (graphHighlighted === hit.id) {
        graphHighlighted = null;
      } else {
        graphHighlighted = hit.id;
      }
      isDragging = true;
      dragNode = hit;
      dragOffX = m.x - hit.x;
      dragOffY = m.y - hit.y;
    } else {
      graphHighlighted = null;
    }
  };

  const handleMove = (e) => {
    if (!isDragging || !dragNode) return;
    const m = getMouse(e);
    dragNode.x = m.x - dragOffX;
    dragNode.y = m.y - dragOffY;
    dragNode.vx = 0;
    dragNode.vy = 0;
  };

  const handleUp = () => {
    isDragging = false;
    dragNode = null;
  };

  canvas.onmousedown = handleDown;
  window.onmousemove = handleMove;
  window.onmouseup = handleUp;

  // Touch support
  canvas.ontouchstart = (e) => { e.preventDefault(); handleDown(e); };
  canvas.ontouchmove = (e) => { e.preventDefault(); handleMove(e); };
  canvas.ontouchend = (e) => { e.preventDefault(); handleUp(); };

  function simulate() {
    const Ww = W, Hh = H;
    const centerX = Ww / 2, centerY = Hh / 2;
    const repulsion = 6000;
    const attraction = 0.003;
    const damping = 0.9;
    const minDist = 35;
    const rotationSpeed = graphRotating ? 0.0006 : 0;

    // Center gravity + rotation
    for (const n of graphNodes) {
      n.vx += (centerX - n.x) * 0.0005;
      n.vy += (centerY - n.y) * 0.0005;
      if (rotationSpeed) {
        const rx = n.x - centerX, ry = n.y - centerY;
        n.vx += -ry * rotationSpeed;
        n.vy += rx * rotationSpeed;
      }
    }

    // Repulsion between all nodes
    for (let i = 0; i < graphNodes.length; i++) {
      for (let j = i + 1; j < graphNodes.length; j++) {
        const a = graphNodes[i], b = graphNodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        if (dist < minDist) dist = minDist;
        const force = repulsion / (dist * dist);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }

    // Edge attraction
    for (const e of graphEdges) {
      const a = graphNodes.find(n => n.id === e.s);
      const b = graphNodes.find(n => n.id === e.t);
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = (dist - 80) * attraction;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }

    // Apply velocity
    for (const n of graphNodes) {
      if (n === dragNode) continue;
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
      n.x = Math.max(20, Math.min(Ww - 20, n.x));
      n.y = Math.max(20, Math.min(Hh - 20, n.y));
    }

    drawGraph(ctx, W, Hh);
    if (graphRunning) graphAnimId = requestAnimationFrame(simulate);
  }

  simulate();
}

function drawGraph(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);

  // Find highlighted node's connections
  const highlightedEdges = new Set();
  if (graphHighlighted) {
    for (const e of graphEdges) {
      if (e.s === graphHighlighted || e.t === graphHighlighted) {
        highlightedEdges.add(e.s + '->' + e.t);
        highlightedEdges.add(e.t + '->' + e.s);
      }
    }
  }

  // Edges
  for (const e of graphEdges) {
    const a = graphNodes.find(n => n.id === e.s);
    const b = graphNodes.find(n => n.id === e.t);
    if (!a || !b) continue;
    const isHighlighted = graphHighlighted && (highlightedEdges.has(e.s + '->' + e.t));
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isHighlighted ? 'rgba(166,136,255,0.6)' : 'rgba(166,136,255,0.15)';
    ctx.lineWidth = isHighlighted ? 2.5 : 1.2;
    ctx.stroke();
  }

  // Nodes
  for (const n of graphNodes) {
    const isHighlighted = graphHighlighted === n.id;
    const isConnected = graphHighlighted && highlightedEdges.has(n.id + '->' + graphHighlighted);

    let baseColor = nodeColors[n.group] || '#6a6a8a';
    let alpha = '30';
    let r = n.r;
    let glow = n.r * 3;
    let borderColor = null;

    if (isHighlighted) {
      baseColor = '#a688ff';
      alpha = '50';
      r = n.r * 1.25;
      glow = n.r * 5;
      borderColor = '#fff';
    } else if (isConnected) {
      alpha = '45';
      r = n.r * 1.1;
      glow = n.r * 4;
    } else if (graphHighlighted) {
      // Dim unconnected nodes
      alpha = '12';
      r = n.r * 0.85;
    }

    // Glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glow);
    grad.addColorStop(0, baseColor + alpha);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, glow, 0, Math.PI * 2);
    ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = baseColor;
    ctx.fill();
    if (borderColor || n.group === 'active') {
      ctx.strokeStyle = borderColor || '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label
    const labelOpacity = graphHighlighted && !isHighlighted && !isConnected ? '0.35' : '0.9';
    ctx.fillStyle = `rgba(224,224,240,${labelOpacity})`;
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y + r + 16);

    // Highlight ring animation
    if (isHighlighted) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(166,136,255,0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Update node count
  const countEl = document.getElementById('nodeCountDisplay');
  if (countEl) countEl.textContent = graphNodes.length;
}

// ─── Graph controls ───

function toggleGraphRotate() {
  graphRotating = !graphRotating;
  document.getElementById('gbToggleRotate').classList.toggle('active', graphRotating);
}

function resetGraphView() {
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;
  const container = document.getElementById('graphContainer');
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight || 340;
  const cx = W / 2, cy = H / 2;

  graphNodes.forEach((n, i) => {
    const angle = (i / graphNodes.length) * Math.PI * 2;
    const radius = Math.min(W, H) * 0.3;
    n.x = cx + Math.cos(angle) * radius + (Math.random() - 0.5) * 20;
    n.y = cy + Math.sin(angle) * radius + (Math.random() - 0.5) * 20;
    n.vx = 0;
    n.vy = 0;
  });
  graphHighlighted = null;
}

function startGraphBuildDemo() {
  const btn = document.getElementById('gbBuildDemo');
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    btn.textContent = '▸ Construir grafo';
    graphBuildStep = 0;
    // Reset nodes
    graphNodes = [];
    graphEdges = [];
    const canvas = document.getElementById('graphCanvas');
    if (canvas) {
      const W = canvas.parentElement.clientWidth;
      const H = canvas.parentElement.clientHeight || 340;
      const cx = W / 2, cy = H / 2;
      graphNodes = graphData.nodes.map((n) => ({
        ...n,
        x: cx + (Math.random() - 0.5) * (W * 0.6),
        y: cy + (Math.random() - 0.5) * (H * 0.6),
        vx: 0, vy: 0,
        r: n.group === 'active' ? 14 : (n.group === 'addable' ? 7 : 9),
      }));
      graphEdges = [...graphData.edges];
    }
    const info = document.getElementById('gbInfo');
    if (info) info.textContent = 'Grafo reiniciado';
    return;
  }

  btn.classList.add('active');
  btn.textContent = '⏹ Reiniciar demo';
  graphBuildStep = 1;

  // Start with just the active node
  graphNodes = [];
  graphEdges = [];
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight || 340;
  const cx = W / 2, cy = H / 2;

  const activeNode = { ...graphData.nodes.find(n => n.id === 'active') };
  activeNode.x = cx;
  activeNode.y = cy;
  activeNode.vx = 0;
  activeNode.vy = 0;
  activeNode.r = 14;
  graphNodes.push(activeNode);

  const info = document.getElementById('gbInfo');
  if (info) info.textContent = 'Paso 1: Creá "Nota Actual" — todo arranca con una nota';

  // Schedule the build steps
  const buildSchedule = [
    { delay: 1500, id: 'marie', label: 'Marie Curie', edgeFrom: 'active', msg: 'Paso 2: Escribí [[Marie Curie]] → aparece la nota conectada' },
    { delay: 2800, id: 'radio', label: 'Radiactividad', edgeFrom: 'active', msg: 'Paso 3: Creás [[Radiactividad]] — el grafo empieza a crecer' },
    { delay: 4000, id: 'polonio', label: 'Polonio', edgeFrom: 'marie', msg: 'Paso 4: [[Polonio]] se conecta a Marie Curie — ¡enlaces en cadena!' },
    { delay: 5300, id: 'nobel', label: 'Premios Nobel', edgeFrom: 'radio', msg: 'Paso 5: Cuantos más [[enlaces]], más conexiones aparecen' },
    { delay: 6600, id: 'fisica', label: 'Física Cuántica', edgeFrom: 'radio', msg: 'Paso 6: El grafo revela conexiones que no habías planeado' },
  ];

  buildSchedule.forEach(({ delay, id, label, edgeFrom, msg }) => {
    setTimeout(() => {
      const nodeData = graphData.nodes.find(n => n.id === id);
      if (!nodeData) return;
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.min(W, H) * 0.3;
      graphNodes.push({
        ...nodeData,
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: 0, vy: 0,
        r: nodeData.group === 'addable' ? 7 : 9,
      });
      graphEdges.push({ s: edgeFrom, t: id });

      // Also add edges from original graphData
      const extraEdges = graphData.edges.filter(e => e.t === id && graphNodes.find(n => n.id === e.s));
      extraEdges.forEach(e => {
        if (!graphEdges.find(g => g.s === e.s && g.t === e.t)) {
          graphEdges.push(e);
        }
      });

      if (info) info.textContent = msg;
    }, delay);
  });

  // Final message
  setTimeout(() => {
    if (info) {
      info.textContent = '✅ ¡Grafo construido! Cada nota nueva se conecta automáticamente.';
    }
    btn.classList.remove('active');
    btn.textContent = '▸ Construir grafo';
    graphBuildStep = 0;
  }, 8200);
}

function graphAddNote(label) {
  const id = label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // Check if already in graph
  if (graphNodes.find(n => n.id === id)) {
    const info = document.getElementById('gbInfo');
    if (info) info.textContent = '⚠️ ' + label + ' ya está en el grafo';
    return;
  }

  // Find a random existing node to connect to
  const existingNodes = graphNodes.filter(n => n.group !== 'addable');
  if (existingNodes.length === 0) return;
  const target = existingNodes[Math.floor(Math.random() * existingNodes.length)];

  const canvas = document.getElementById('graphCanvas');
  const W = canvas ? canvas.parentElement.clientWidth : 600;
  const H = canvas ? canvas.parentElement.clientHeight : 340;
  const cx = W / 2, cy = H / 2;

  // Position near the target node
  const angle = Math.random() * Math.PI * 2;
  const dist = 40 + Math.random() * 60;

  graphNodes.push({
    id, label,
    x: target.x + Math.cos(angle) * dist,
    y: target.y + Math.sin(angle) * dist,
    vx: 0, vy: 0,
    r: 9,
    group: 'connected',
  });
  graphEdges.push({ s: target.id, t: id });

  const info = document.getElementById('gbInfo');
  if (info) info.textContent = '✅ ' + label + ' agregada y conectada a ' + target.label;
}

function initSearchDemo() {
  const input = document.getElementById('searchInput');
  if (!input) return;

  let timeout = null;
  input.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => doSearch(input.value), 150);
  });
}

function doSearch(query) {
  const result = document.getElementById('searchResult');
  if (!result) return;

  const q = query.trim().toLowerCase();
  if (!q) {
    result.innerHTML = '<div class="empty-state">🔍 Escribí algo para buscar entre las notas de ejemplo</div>';
    return;
  }

  // Parse operators
  let tagFilter = null;
  let exactPhrase = null;
  let excludeWords = [];
  let searchTerms = [];

  // tag:#something
  const tagMatch = q.match(/tag:(\S+)/);
  if (tagMatch) {
    tagFilter = tagMatch[1].replace(/^#/, '');
  }

  // "exact phrase"
  const phraseMatch = q.match(/"([^"]+)"/);
  if (phraseMatch) {
    exactPhrase = phraseMatch[1].toLowerCase();
  }

  // -exclude
  const excludeMatches = q.match(/-(\w+)/g);
  if (excludeMatches) {
    excludeWords = excludeMatches.map(m => m.slice(1).toLowerCase());
  }

  // Remaining words
  let cleaned = q
    .replace(/tag:\S+/g, '')
    .replace(/"([^"]+)"/g, '')
    .replace(/-\w+/g, '')
    .trim();
  searchTerms = cleaned.split(/\s+/).filter(Boolean);

  let results = [...searchNotes];

  // Filter by tag
  if (tagFilter) {
    results = results.filter(r =>
      r.tags.some(t => t.toLowerCase() === tagFilter.toLowerCase())
    );
  }

  // Filter by exact phrase
  if (exactPhrase) {
    results = results.filter(r => r.content.toLowerCase().includes(exactPhrase)
      || r.name.toLowerCase().includes(exactPhrase));
  }

  // Filter by search terms
  if (searchTerms.length > 0) {
    results = results.filter(r => {
      const text = (r.name + ' ' + r.content).toLowerCase();
      return searchTerms.every(t => text.includes(t));
    });
  }

  // Exclude
  if (excludeWords.length > 0) {
    results = results.filter(r => {
      const text = (r.name + ' ' + r.content).toLowerCase();
      return !excludeWords.some(w => text.includes(w));
    });
  }

  if (results.length === 0) {
    result.innerHTML = `<div class="empty-state">🔍 Sin resultados para "${query}"</div>`;
    return;
  }

  let html = `<div style="font-size:.82rem;color:var(--text2);margin-bottom:8px;">🔍 ${results.length} resultado${results.length > 1 ? 's' : ''} para "${query}":</div>`;
  results.forEach(r => {
    html += `<div class="link-item">
      <span><span class="from">📄 ${r.name}</span> <span style="color:var(--text2);font-size:.78rem;">#${r.tags.join(' #')}</span></span>
      <span style="color:var(--text2);font-size:.78rem;">${r.content.length > 50 ? r.content.slice(0, 50) + '…' : r.content}</span>
    </div>`;
  });
  result.innerHTML = html;
}
